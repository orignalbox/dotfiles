# Transparency and Backend
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pbo = true;

# Screen Tearing Fix
vsync = true;
use-damage = true;

# Window Opacity Rules
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 0.5;
inactive-opacity-override = false;


# Fading
fading = true;
fade-delta = 5;
fade-in-step = 0.03;
fade-out-step = 0.03;



